<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Photo Game</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Quicksand:wght@500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 241, 168, 0.9), transparent 28%),
        radial-gradient(circle at 85% 80%, rgba(255, 208, 220, 0.9), transparent 30%),
        #d8ebfb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow: hidden;
    }

    .game-card {
      width: min(760px, 96vw);
      min-height: min(720px, 94vh);
      background: #fffaf0;
      border: 6px solid white;
      border-radius: 34px;
      box-shadow: 0 24px 60px rgba(80, 120, 160, 0.25);
      padding: 28px 26px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .sticker {
      position: absolute;
      font-size: 44px;
      animation: floaty 2.8s ease-in-out infinite;
      opacity: 0.9;
      pointer-events: none;
      z-index: 1;
    }

    .sticker.one {
      top: 22px;
      left: 26px;
    }

    .sticker.two {
      top: 26px;
      right: 30px;
      animation-delay: .5s;
    }

    .sticker.three {
      bottom: 26px;
      left: 28px;
      animation-delay: 1s;
    }

    .sticker.four {
      bottom: 24px;
      right: 30px;
      animation-delay: 1.4s;
    }

    @keyframes floaty {
      0%, 100% {
        transform: translateY(0) rotate(-4deg);
      }
      50% {
        transform: translateY(-10px) rotate(5deg);
      }
    }

    h1 {
      font-family: 'Gaegu', cursive;
      font-size: 48px;
      color: #4e7fa8;
      margin-bottom: 4px;
      position: relative;
      z-index: 2;
    }

    .subtitle {
      font-family: 'Gaegu', cursive;
      font-size: 26px;
      color: #8b6b4f;
      margin-bottom: 18px;
      position: relative;
      z-index: 2;
    }

    .score {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #d8ebfb;
      color: #4e7fa8;
      border: 3px solid white;
      padding: 8px 20px;
      border-radius: 999px;
      font-family: 'Gaegu', cursive;
      font-size: 25px;
      box-shadow: 0 7px 0 rgba(100, 140, 170, 0.18);
      margin-bottom: 22px;
      position: relative;
      z-index: 2;
    }

    .board {
      width: min(560px, 90vw);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      position: relative;
      z-index: 3;
    }

    .card {
      aspect-ratio: 1 / 1.15;
      border: none;
      border-radius: 22px;
      background: transparent;
      perspective: 900px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 0 rgba(120, 90, 70, 0.15);
      border: 4px solid white;
      overflow: hidden;
    }

    .card-front {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.4), transparent),
        #fff1a8;
      color: #8b6b4f;
      font-family: 'Gaegu', cursive;
      font-size: 42px;
    }

    .card-front::before {
      content: "♡";
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #ffd0dc;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 -5px rgba(255,255,255,0.35);
    }

    .card-back {
      background: #d8ebfb;
      transform: rotateY(180deg);
      padding: 6px;
    }

    .card-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      display: block;
    }

    .card.matched .card-back {
      background: #d9e9ba;
      animation: matchedPop 0.35s ease;
    }

    @keyframes matchedPop {
      0% {
        transform: rotateY(180deg) scale(1);
      }
      50% {
        transform: rotateY(180deg) scale(1.12);
      }
      100% {
        transform: rotateY(180deg) scale(1);
      }
    }

    .win-popup {
      position: absolute;
      inset: 0;
      background: rgba(216, 235, 251, 0.78);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 24px;
    }

    .win-popup.show {
      display: flex;
    }

    .win-box {
      background: #fffaf0;
      border: 5px solid white;
      border-radius: 32px;
      padding: 32px 30px;
      box-shadow: 0 18px 40px rgba(80, 120, 160, 0.24);
      animation: pop 0.42s ease;
      max-width: 430px;
      width: 100%;
    }

    @keyframes pop {
      from {
        transform: scale(0.68);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .win-box h2 {
      font-family: 'Gaegu', cursive;
      font-size: 46px;
      color: #4e7fa8;
      margin-bottom: 8px;
    }

    .win-box p {
      font-family: 'Gaegu', cursive;
      font-size: 27px;
      color: #8b6b4f;
      margin-bottom: 22px;
      line-height: 1.2;
    }

    .next-btn {
      border: none;
      background: #ef8d97;
      color: white;
      font-family: 'Gaegu', cursive;
      font-size: 31px;
      padding: 10px 28px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 0 #c96a78;
      transition: 0.16s ease;
    }

    .next-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #c96a78;
    }

    .restart-btn {
      margin-top: 14px;
      border: none;
      background: #d8ebfb;
      color: #4e7fa8;
      font-family: 'Gaegu', cursive;
      font-size: 24px;
      padding: 7px 22px;
      border-radius: 999px;
      cursor: pointer;
    }

    @media (max-width: 560px) {
      body {
        padding: 0;
      }

      .game-card {
        width: 100vw;
        min-height: 100vh;
        border-radius: 0;
        border: none;
        padding: 28px 14px;
      }

      h1 {
        font-size: 39px;
      }

      .subtitle {
        font-size: 22px;
      }

      .board {
        width: 94vw;
        gap: 10px;
      }

      .card-front::before {
        width: 48px;
        height: 48px;
      }

      .sticker {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <div class="game-card">
    <div class="sticker one">🎂</div>
    <div class="sticker two">🩵</div>
    <div class="sticker three">⭐</div>
    <div class="sticker four">🎀</div>

    <h1>buka kartu dulu 😋</h1>
    <div class="subtitle">cari foto yang sama biar bisa lanjut</div>

    <div class="score">
      <span>pasangan ketemu:</span>
      <span id="matchCount">0</span>
      <span>/ 6</span>
    </div>

    <div class="board" id="board"></div>

    <div class="win-popup" id="winPopup">
      <div class="win-box">
        <h2>YEAYY PINTER 🎉</h2>
        <p>lanjut dah lanjut</p>
        <button class="next-btn" onclick="goNext()">lanjut ➜</button>
        <br>
        <button class="restart-btn" onclick="restartGame()">main lagi</button>
      </div>
    </div>
  </div>

  <script>
    const photos = [
      "game1.jpg",
      "game2.jpg",
      "game3.jpg",
      "game4.jpg",
      "game5.jpg",
      "game6.jpg"
    ];

    const cardsData = [...photos, ...photos];

    const board = document.getElementById("board");
    const matchCountText = document.getElementById("matchCount");
    const winPopup = document.getElementById("winPopup");

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let matchedCount = 0;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [array[i], array[randomIndex]] = [array[randomIndex], array[i]];
      }
      return array;
    }

    function createBoard() {
      board.innerHTML = "";
      matchedCount = 0;
      matchCountText.textContent = matchedCount;
      winPopup.classList.remove("show");

      firstCard = null;
      secondCard = null;
      lockBoard = false;

      const shuffled = shuffle([...cardsData]);

      shuffled.forEach((photo) => {
        const card = document.createElement("button");
        card.className = "card";
        card.dataset.photo = photo;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front"></div>
            <div class="card-back">
              <img src="${photo}" alt="Foto game">
            </div>
          </div>
        `;

        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
      });
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card === firstCard) return;
      if (card.classList.contains("matched")) return;

      card.classList.add("flipped");

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.photo === secondCard.dataset.photo;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matchedCount++;
        matchCountText.textContent = matchedCount;

        resetTurn();

        if (matchedCount === 6) {
          setTimeout(() => {
            winPopup.classList.add("show");
          }, 650);
        }
      } else {
        lockBoard = true;

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetTurn();
        }, 760);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function restartGame() {
      createBoard();
    }

    function goNext() {
      window.location.href = "hal5.html";
    }

    createBoard();
  </script>
</body>
</html>
